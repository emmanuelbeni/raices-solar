<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Us | Donate</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            background: #111827;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 32px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .paypal {
            background: #3b82f6;
            color: white;
        }

        .paypal:hover {
            background: #2563eb;
        }

        .cashapp {
            background: #22c55e;
            color: white;
        }

        .cashapp:hover {
            background: #16a34a;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Support the Project</h1>
    <p>
        If you like what I’m building, you can support development here.  
        Every contribution helps keep this project alive and growing.
    </p>

    <!-- Replace these links with your real ones -->
    <a class="btn paypal" href="https://paypal.me/raicessolar" target="_blank">
        Donate with PayPal
    </a>

    <div class="footer">
        Thank you for your support ❤️
    </div>
</div>

</body>
</html>
